spring.application.name=diploma-shop

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/diploma_dp?useUnicode=true&characterEncoding=UTF-8&clientEncoding=true}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}


server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true


spring.thymeleaf.encoding=UTF-8

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.generate-ddl=true

server.port=${PORT:8080}

logging.level.org.hibernate.SQL=DEBUG


app.mail.dev-mode=${MAIL_DEV_MODE:true}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}
