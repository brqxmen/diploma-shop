<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Street 19 - Cart</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Moderustic:wght@300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css(v='20260518-1')}">
    <link rel="stylesheet" th:href="@{/css/shop-style.css(v='20260525-3')}">
    <link rel="stylesheet" th:href="@{/css/ui-polish.css(v='20260525-1')}">
</head>
<body>

<div th:replace="~{fragments/header :: mainHeader('', false)}"></div>

<main class="cart-page">
    <div class="cart-page-top">
        <h1 class="cart-title">CART</h1>
        <a th:href="@{/shop}" class="cart-back-button" id="cartBackButton" data-i18n="cart.back">← BACK</a>
    </div>

    <div class="cart-layout">
        <div id="cartPageItems" class="cart-page-items"></div>

        <aside class="checkout-panel">
            <p class="checkout-login">Sign in to your account for a faster checkout.</p>
            <button class="checkout-button" id="checkoutButton">CHECKOUT</button>
            <div class="checkout-subtotal">
                <span>Subtotal:</span>
                <strong id="cartPageSubtotal">$0.00</strong>
            </div>
        </aside>
    </div>
</main>

<footer class="main-footer cart-footer">
    <div class="footer-container">
        <div class="footer-top">
            <div class="footer-subscribe">
                <h3>Sign up for updates</h3>
                <form class="subscribeForm" id="subscribeForm">
                    <label for="userEmail"></label><input type="email" id="userEmail" placeholder="E-mail" class="footer-input" required>
                    <button type="submit" class="footer-submit">SUBSCRIBE</button>
                </form>
                <p id="subscribeMsg" class="subscribe-message subscribe-message--main"></p>
            </div>

            <div class="footer-links">
                <h4>MORE INFO</h4>
                <ul>
                    <li><a href="https://t.me/bmnknz" target="_blank">Contact</a></li>
                    <li><a href="https://t.me/bmnknz" target="_blank">Help Center</a></li>
                    <li><a href="#">Privacy Policy</a></li>
                    <li><a href="#">Refund Policy</a></li>
                    <li><a href="#">Shipping Policy</a></li>
                    <li><a href="#">Terms of Service</a></li>
                </ul>
            </div>
        </div>

        <div class="footer-bottom">
            <div class="footer-socials">
                <div class="social-icons">
                    <a href="https://instagram.com" target="_blank">
                        <img th:src="@{/images/instagram.svg}" alt="Instagram">
                    </a>
                    <a href="https://youtube.com" target="_blank">
                        <img th:src="@{/images/youtube.svg}" alt="YouTube">
                    </a>
                    <a href="https://tiktok.com" target="_blank">
                        <img th:src="@{/images/tiktok.svg}" alt="TikTok">
                    </a>
                </div>
            </div>

            <div class="footer-copyright">
                © 2026 - STREET 19
            </div>

            <div class="footer-payment">
                <a href="https://pay.google.com" target="_blank" class="payment-link">
                    <img th:src="@{/images/Google_Pay_Logo.svg}" alt="GPay">
                </a>
                <a href="https://mastercard.com" target="_blank" class="payment-link">
                    <img th:src="@{/images/ma_symbol.svg}" alt="Mastercard">
                </a>
                <a href="https://visa.com" target="_blank" class="payment-link">
                    <img th:src="@{/images/Visa.svg}" alt="Visa">
                </a>
                <a href="https://apple.com/apple-pay" target="_blank" class="payment-link">
                    <img th:src="@{/images/Applepay.svg}" alt="ApplePay">
                </a>
            </div>
        </div>
    </div>
</footer>

<script th:src="@{/js/image-utils.js(v='20260525-1')}"></script>
<script th:src="@{/js/checkout-modal.js(v='20260519-3')}"></script>
<script th:src="@{/js/cart-page.js(v='20260519-2')}"></script>
<script th:src="@{/js/preferences.js(v='20260520-7')}"></script>
<script th:src="@{/js/header-actions.js}"></script>
</body>
</html>
