<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Street 19 - Profile</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Moderustic:wght@300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css(v='20260518-1')}">
    <link rel="stylesheet" th:href="@{/css/shop-style.css(v='20260520-1')}">
    <link rel="stylesheet" th:href="@{/css/ui-polish.css(v='20260520-1')}">
</head>
<body class="profile-body">

<div class="main-header profile-header">
    <div class="header-container">
        <div class="logo">
            <a th:href="@{/}">
                <img th:src="@{/images/street 19.svg}" alt="logo">
            </a>
        </div>

        <div class="nav-menu">
            <ul>
                <li><a th:href="@{/shop}" class="nav-link bg"><span>shop</span></a></li>
                <li><a th:href="@{/culture}" class="nav-link bg"><span>culture</span></a></li>
                <li><a th:href="@{/learn}" class="nav-link bg"><span>learn</span></a></li>
                <li><a th:href="@{/events}" class="nav-link bg"><span>events</span></a></li>
            </ul>
        </div>

        <div class="header-icon">
            <a href="#" class="header-search-toggle">
                <img th:src="@{/images/Vector-1.svg}" alt="search" class="nav-icon">
            </a>
            <a th:href="@{/cart}">
                <img th:src="@{/images/Vector.svg}" alt="cart" class="nav-icon">
            </a>
            <a th:href="@{/profile}">
                <img th:src="@{/images/Vector-2.svg}" alt="profile" class="nav-icon">
            </a>
            <form class="header-search-form" th:action="@{/shop}" method="get">
                <label>
                    <input type="text" name="search" placeholder="Search...">
                </label>
            </form>
        </div>
    </div>
</div>

<main class="profile-page">
    <div class="profile-tabs">
        <a th:href="@{/profile/orders}" id="ordersTab">Orders</a>
        <a th:href="@{/profile}" id="profileTab">Profile</a>
    </div>

    <section class="profile-section" id="ordersSection">
        <h1>Orders</h1>
        <div id="ordersList" class="orders-list"></div>
    </section>

    <section class="profile-section" id="profileSection">
        <h1>Profile</h1>
        <div class="profile-card">
            <div class="profile-info-row">
                <span>Name</span>
                <strong id="profileName">-</strong>
            </div>
            <div class="profile-info-row">
                <span>Email</span>
                <strong id="profileEmail">-</strong>
            </div>
            <div class="profile-info-row">
                <span>Address</span>
                <strong id="profileAddress">-</strong>
            </div>
        </div>

        <div class="profile-actions">
            <button type="button" id="editProfileBtn">Edit</button>
        </div>

        <div class="profile-address">
            <span>Address</span>
            <button type="button" id="addAddressBtn">Add</button>
            <div class="address-placeholder">No addresses yet</div>
        </div>
    </section>

    <a th:href="@{/shop}" class="profile-back">Back to shop</a>
    <button type="button" id="logoutBtn" class="profile-logout-btn">Sign out</button>
</main>

<div class="profile-modal" id="profileModal">
    <div class="profile-modal-card">
        <h2>Edit Profile</h2>
        <form id="profileForm">
            <div class="profile-form-grid">
                <input type="text" id="firstNameInput" placeholder="First name">
                <input type="text" id="lastNameInput" placeholder="Last name">
            </div>
            <input type="email" id="emailInput" placeholder="Email">
            <label class="profile-checkbox">
                <input type="checkbox" id="emailOffersInput">
                <span>Sign me up with news and offers</span>
            </label>
            <input type="text" id="addressInput" placeholder="Address">
            <div class="profile-modal-actions">
                <button type="button" id="cancelProfileBtn">Cancel</button>
                <button type="submit">Save</button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/profile-page.js(v='20260519-2')}"></script>
<script th:src="@{/js/preferences.js(v='20260518-6')}"></script>
<script th:src="@{/js/header-actions.js}"></script>
</body>
</html>
