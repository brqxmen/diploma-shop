<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin — Clients</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Moderustic:wght@300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">

<aside class="admin-sidebar">
    <div class="admin-logo">STREET 19<span>admin</span></div>
    <nav class="admin-nav">
        <a th:href="@{/admin}" class="admin-nav-link">📊 Dashboard</a>
        <a th:href="@{/admin/products}" class="admin-nav-link">📦 Products</a>
        <a th:href="@{/admin/events}" class="admin-nav-link">📅 Events</a>
        <a th:href="@{/admin/orders}" class="admin-nav-link">Orders</a>
        <a th:href="@{/admin/clients}" class="admin-nav-link active">👥 Clients</a>
        <a th:href="@{/admin/subscribers}" class="admin-nav-link">📧 Subscribers</a>
    </nav>
    <a th:href="@{/}" class="admin-back-link">← Back to site</a>
</aside>

<main class="admin-main">
    <div class="admin-header">
        <h1>Clients</h1>
        <span class="admin-count" th:text="${#lists.size(clients)} + ' total'"></span>
    </div>

    <div class="admin-table-wrap">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Address</th>
                    <th>Email Offers</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${clients}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.firstName}"></td>
                    <td th:text="${c.lastName}"></td>
                    <td th:text="${c.email}"></td>
                    <td th:text="${c.address}"></td>
                    <td th:text="${c.emailOffers} ? 'Yes' : 'No'"></td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
